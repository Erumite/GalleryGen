name: Build executables

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: generate_gallery
          - os: windows-latest
            artifact: generate_gallery.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name generate_gallery generate_gallery.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate_gallery-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename artifacts for release
        run: |
          cp dist/generate_gallery-macos-latest/generate_gallery dist/generate_gallery-mac
          cp dist/generate_gallery-windows-latest/generate_gallery.exe dist/generate_gallery.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/generate_gallery-mac
            dist/generate_gallery.exe
